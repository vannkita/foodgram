name: Kittygram CI/CD

on:
  push:
    branches:
      - '**'

env:
  COMPOSE_FILE: docker-compose.production.yml

jobs:
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13.10
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
          POSTGRES_DB: django_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip  
          pip install flake8==6.0.0 flake8-isort==6.0.0 
          pip install -r ./backend/requirements.txt  

      - name: Run backend tests and flake8
        env:
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django_password
          POSTGRES_DB: django_db
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          python -m flake8 backend/
          cd backend/
          python manage.py test

  build_and_push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: tests  # Зависим только от тестов бекенда
    strategy:
      matrix:
        component: ['backend', 'frontend', 'gateway']
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v4
        with:
          context: ./${{ matrix.component }}/
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/kittygram_${{ matrix.component }}:latest
            ${{ secrets.DOCKER_USERNAME }}/kittygram_${{ matrix.component }}:${{ github.sha }}

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build_and_push
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Prepare environment file
        run: |
          cat <<EOF > .env.production
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=${{ secrets.DEBUG }}
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOMAIN=${{ secrets.DOMAIN }}
          EOF

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.production.yml, .env.production"
          target: "~/kittygram"

      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd ~/kittygram
            docker compose -f $COMPOSE_FILE down
            docker compose -f $COMPOSE_FILE pull
            docker compose -f $COMPOSE_FILE up -d
            docker compose -f $COMPOSE_FILE exec backend python manage.py migrate
            docker compose -f $COMPOSE_FILE exec backend python manage.py collectstatic --noinput
            docker system prune -af