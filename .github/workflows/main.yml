deploy:
  if: github.ref == 'refs/heads/main'
  runs-on: ubuntu-latest
  needs: backend_tests
  steps:
    - uses: actions/checkout@v3
    # Генерируем docker-compose.production.yml
    - name: Generate compose file
      run: |
        cat << 'EOF' > docker-compose.production.yml
        services:
          db:
            image: postgres:14
            container_name: foodgram-db
            restart: always
            env_file: .env.production
            volumes:
              - postgres_data:/var/lib/postgresql/data
            networks:
              - foodgram-network
          backend:
            image: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest
            container_name: foodgram-backend
            restart: always
            env_file: .env.production
            depends_on:
              - db
            volumes:
              - static_volume:/app/staticfiles
              - media_volume:/app/media
            networks:
              - foodgram-network
          frontend:
            image: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest
            container_name: foodgram-frontend
            restart: always
            networks:
              - foodgram-network
          proxy:
            image: ${{ secrets.DOCKER_USERNAME }}/foodgram_proxy:latest
            container_name: foodgram-proxy
            restart: always
            ports:
              - "80:80"
            volumes:
              - static_volume:/app/staticfiles
              - media_volume:/app/media
            depends_on:
              - backend
              - frontend
            networks:
              - foodgram-network
        volumes:
          postgres_data:
          static_volume:
          media_volume:
        networks:
          foodgram-network:
            driver: bridge
        EOF
    # Создаем .env.production
    - name: Create .env.production
      run: |
        cat << EOF > .env.production
        SECRET_KEY=${{ secrets.SECRET_KEY }}
        DEBUG=False
        POSTGRES_DB=${{ secrets.POSTGRES_DB }}
        POSTGRES_USER=${{ secrets.POSTGRES_USER }}
        POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
        DB_HOST=db
        DB_PORT=5432
        DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
        DOMAIN=${{ secrets.DOMAIN }}
        ALLOWED_HOSTS=${{ secrets.DOMAIN }},localhost,127.0.0.1
        EOF
    # Копируем файлы на сервер
    - name: Copy files to server
      uses: appleboy/scp-action@v0.1.6
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        source: "docker-compose.production.yml,.env.production"
        target: "/home/${{ secrets.USER }}/foodgram/"
        overwrite: true
    # Выполняем деплой
    - name: Deploy application
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USER }}
        key: ${{ secrets.SSH_KEY }}
        passphrase: ${{ secrets.SSH_PASSPHRASE }}
        script: |
          cd /home/${{ secrets.USER }}/foodgram
          # Устанавливаем права на .env
          chmod 600 .env.production
          # Деплоим приложение
          sudo docker compose -f docker-compose.production.yml pull
          sudo docker compose -f docker-compose.production.yml down
          sudo docker compose -f docker-compose.production.yml up -d --build
          sudo docker compose -f docker-compose.production.yml exec backend python manage.py migrate
          sudo docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput
          # Очистка
          sudo docker system prune -af