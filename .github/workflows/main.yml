name: Foodgram CI/CD

on:
  push:
    branches:
      - '**'

jobs:
  backend_tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: foodgram_user
          POSTGRES_PASSWORD: foodgram_pass
          POSTGRES_DB: foodgram_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.9

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8==6.0.0 flake8-isort==6.0.0
          pip install -r ./backend/requirements.txt

      - name: Run backend tests and flake8
        env:
          POSTGRES_USER: foodgram_user
          POSTGRES_PASSWORD: foodgram_pass
          POSTGRES_DB: foodgram_db
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
        run: |
          python -m flake8 backend/
          cd backend/
          python manage.py test

  build_and_push_backend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: backend_tests
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest

  build_and_push_frontend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest

  build_and_push_proxy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push proxy image
        uses: docker/build-push-action@v4
        with:
          context: ./nginx/
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/foodgram_proxy:latest

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: backend_tests
    steps:
      - uses: actions/checkout@v3
      # Генерируем docker-compose.production.yml
      - name: Generate compose file
        run: |
          cat << 'EOF' > docker-compose.production.yml
          services:
            db:
              image: postgres:14
              container_name: foodgram-db
              restart: always
              env_file: .env.production
              volumes:
                - postgres_data:/var/lib/postgresql/data
              networks:
                - foodgram-network
            backend:
              image: ${{ secrets.DOCKER_USERNAME }}/foodgram_backend:latest
              container_name: foodgram-backend
              restart: always
              env_file: .env.production
              depends_on:
                - db
              volumes:
                - static_volume:/app/staticfiles
                - media_volume:/app/media
              networks:
                - foodgram-network
            frontend:
              image: ${{ secrets.DOCKER_USERNAME }}/foodgram_frontend:latest
              container_name: foodgram-frontend
              restart: always
              networks:
                - foodgram-network
            proxy:
              image: ${{ secrets.DOCKER_USERNAME }}/foodgram_proxy:latest
              container_name: foodgram-proxy
              restart: always
              ports:
                - "80:80"
              volumes:
                - static_volume:/app/staticfiles
                - media_volume:/app/media
              depends_on:
                - backend
                - frontend
              networks:
                - foodgram-network
          volumes:
            postgres_data:
            static_volume:
            media_volume:
          networks:
            foodgram-network:
              driver: bridge
          EOF
      # Создаем .env.production
      - name: Create .env.production
        run: |
          cat << EOF > .env.production
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          DB_HOST=db
          DB_PORT=5432
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOMAIN=${{ secrets.DOMAIN }}
          ALLOWED_HOSTS=${{ secrets.DOMAIN }},localhost,127.0.0.1
          EOF
      # Копируем файлы на сервер
      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: "docker-compose.production.yml,.env.production"
          target: "/home/${{ secrets.USER }}/foodgram/"
          overwrite: true
      # Выполняем деплой
      - name: Deploy application
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script: |
            cd /home/${{ secrets.USER }}/foodgram
            # Устанавливаем права на .env
            chmod 600 .env.production
            # Деплоим приложение
            sudo docker compose -f docker-compose.production.yml pull
            sudo docker compose -f docker-compose.production.yml down
            sudo docker compose -f docker-compose.production.yml up -d --build
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py migrate
            sudo docker compose -f docker-compose.production.yml exec backend python manage.py collectstatic --noinput
            # Очистка
            sudo docker system prune -af