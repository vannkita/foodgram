version: '3.8'

services:
  db:
    image: postgres:14
    container_name: foodgram-db
    restart: always
    environment:
      POSTGRES_DB: foodgram_db
      POSTGRES_USER: foodgram_user
      POSTGRES_PASSWORD: foodgram_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - foodgram-network

  backend:
    build: ../backend
    container_name: foodgram-backend
    restart: always
    working_dir: /app
    depends_on:
      - db
    environment:
      DEBUG: "True"
      SECRET_KEY: "django-insecure-373-^89tmw)qmyplv)!8w-$$dq2wm*q4zr0)$$&ofpj%%d86md7c4"
      ALLOWED_HOSTS: "yc16sprint.ru,www.yc16sprint.ru,localhost,127.0.0.1"
      CSRF_TRUSTED_ORIGINS: "http://yc16sprint.ru,http://www.yc16sprint.ru"
      POSTGRES_DB: foodgram_db
      POSTGRES_USER: foodgram_user
      POSTGRES_PASSWORD: foodgram_pass
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - ../backend:/app 
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --no-input &&
             gunicorn foodgram.wsgi:application --bind 0.0.0.0:8000"
    networks:
      - foodgram-network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: foodgram-frontend
    restart: always
    networks:
      - foodgram-network

  proxy:
    image: nginx:1.25.4-alpine
    container_name: foodgram-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/staticfiles
      - media_volume:/app/media
      - frontend_build:/usr/share/nginx/html
    depends_on:
      - backend
      - frontend
    networks:
      - foodgram-network

volumes:
  postgres_data:
  static_volume:
  media_volume:
  frontend_build:

networks:
  foodgram-network:
    driver: bridge
